---
id: https://CCPBioSim.ac.uk/biosim-schema/
name: biosim-schema
title: biosim-schema
version: 0.0.1
description: |-
  Schema for Biomolecular Simulation Data
license: MIT
see_also:
  - https://CCPBioSim.github.io/biosim-schema

prefixes:
  biosim_schema: https://CCPBioSim.ac.uk/biosim-schema/
  linkml: https://w3id.org/linkml/
  biolink: https://w3id.org/biolink/
  schema: http://schema.org/
  example: https://example.org/
  ORCID: https://orcid.org/
  qudt: http://qudt.org/schema/qudt/ # https://qudt.org/doc/2023/01/DOC_VOCAB-UNITS-ALL-v2.1.html
  uniprot: https://identifiers.org/uniprot
  pdb: https://identifiers.org/pdb

default_prefix: biosim_schema
default_range: string

default_curi_maps:
  - semweb_context
imports:
  - linkml:types
  - ./components/biosim_quantities
  - ./components/biosim_stages
  - ./components/biosim_settings
  - ./components/biosim_composition
  - ./components/biosim_observables
  - ./components/biosim_topology
  - ./components/biosim_trajectory
  - ./components/biosim_potentials
  - ./components/biosim_compute

classes:

  # PICK ONE OF THE BELOW ROOT CLASS
  SimulationMetadata:  # root class
    description: root class for biosim-schema
    tree_root: true
    slots:
      - stages # class
      - settings # class
      - observables # class
      - topology # class
      - trajectory # class
      - composition # class
      - potentials # class
      - compute # class


# slots with units initially in SI where possible
slots:

  stages:
    description: Simulation stages
    range: SimulationStages # class

  settings:
    description: Simulation settings
    range: SimulationSettings # class

  composition:
    description: Composition of simulated system.
    range: SystemComposition # class

  observables:
    description: Simulation observables.
    range: SimulationObservables # class

  topology:
    description: Topology information.
    range: TopologyMetadata # class

  trajectory:
    description: Trajectory information.
    range: TrajectoryMetadata # class

  potentials:
    description: Force field potentials used to describe simulated particles.
    range: PotentialMetadata # class

  compute:
    description: Computational environment information.
    range: ComputationalEnvironment # class

  engine_mapping:
    description: Mapping from engine-specific parameter names to schema slots
    multivalued: true


