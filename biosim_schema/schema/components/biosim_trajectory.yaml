id: https://CCPBioSim.ac.uk/biosim-schema/trajectory
name: biosim-trajectory

prefixes:
  biosim_schema: https://CCPBioSim.ac.uk/biosim-schema/

classes:

  TrajectoryMetadata:
    description: Trajectory information.
    slots:
      - simulation_box # class
      - trajectory_output # class

  SimulationBox:
    description: Simulation box information
    slots:
      - box_dimensions # list of floats
      - box_angles # list of floats
      - box_type # enum
      - periodic_boundary_conditions # enum xyz,xy,xz,yz

  Trajectories:
    description: Information in trajectory files.
    slots:
      - positions # bool
      - forces # bool
      - velocities # bool
      - polarizable_charges # bool
      - energies # bool
      - water # bool
      - replica # bool
      - frame_count # int


slots:

  simulation_box:
    description:
      Information about the simulation box.
    range: SimulationBox # class

  trajectory_output:
    description:
      Information included in trajectory files.
    range: Trajectories # class

  frame_count:
    description:
      Total number of snapshots that make up a trajectory.
    range: integer
    minimum_value: 0
    examples:
      - value: 1
    annotations:
      engine_mapping:
        - engine: toptrajparser
          key: frame_count
      example:
        - value: 10000

  periodic_boundary_conditions:
    description:
      What directions in a simulation cell periodic boundaries are set if they are turned on.
    range: PeriodicBoundaryConditions # class
    annotations:
      example:
        - value: xyz

  box_dimensions:
    range: VectorLengthQuantity
    description:
      The lengths/dimensions of the box used to simulate the system.
    examples:
      - value: [10, 10, 10]
    annotations:
      engine_mapping:
        - engine: toptrajparser
          key: box_dimensions
          unit: Ang
      example:
        - value: [10, 10, 10]
          value_unit: nm

  box_angles:
    range: VectorAngleQuantity
    description:
      The angles of the box used to simulate the system.
    examples:
      - value: [90, 90, 90]
    annotations:
      engine_mapping:
        - engine: toptrajparser
          key: box_angles
          unit: degree
      example:
        - value: [90, 90, 90]
          value_unit: degree

  box_type:
    description:
      The type of box used to simuluate the system.
    range: BoxType # enum
    annotations:
      example:
        - value: Cubic

  positions:
    description:
      Are per-frame positions included in the trajectory?
    range: boolean
    annotations:
      engine_mapping:
        - engine: toptrajparser
          key: positions
      example:
        - value: "True"

  forces:
    description:
      Are per-frame forces included in the trajectory?
    range: boolean
    annotations:
      engine_mapping:
        - engine: toptrajparser
          key: forces
      example:
        - value: "True"

  velocities:
    description:
      Are per-frame velocities included in the trajectory?
    range: boolean
    annotations:
      engine_mapping:
        - engine: toptrajparser
          key: velocities
      example:
        - value: "True"

  energies:
    description:
      Are per-frame energies included in the trajectory?
    range: boolean
    annotations:
      example:
        - value: "True"

  polarizable_charges:
    description:
      Are per-frame polarizable charges included in the trajectory?
    range: boolean
    annotations:
      example:
        - value: "True"

  water:
    description:
      Are water molecules included in the trajectory?
    range: boolean
    annotations:
      engine_mapping:
        - engine: toptrajparser
          key: water
      example:
        - value: "True"

  replica:
    description:
      Is this trajectory a replica of another provided trajectory?
    range: boolean
    annotations:
      example:
        - value: "True"

enums:

  PeriodicBoundaryConditions:
    description:
      What directions in a simulation cell periodic boundaries are set if they are turned on.
    permissible_values:
      None:
        description: No PBC
        annotations:
          engine_mapping:
            - engine: gromacs
              key: pbc
              value: no
      xyz:
        description: all axes
        annotations:
          engine_mapping:
            - engine: gromacs
              key: pbc
              value: xyz
      xy:
        description: only xy plane
        annotations:
          engine_mapping:
            - engine: gromacs
              key: pbc
              value: xy
      xz:
        description:  only xz plane
      yz:
        description: only yz plane

  BoxType:
    description:
      Types of box used to simulate the system.
    permissible_values:
      Cubic:
        description: 3D rectangular prism where all sides are equal in length
        aliases:
          - Cubic
          - cubic
        annotations:
          engine_mapping:
            - engine: toptrajparser
              key: box_type
              value: cubic
      Tetragonal:
        description: Simulation boundaries form a rectangular prism, where two sides are equal (a = b ≠ c) and all angles are exactly 90°.
        aliases:
          - Tetragonal
          - tetragonal
        annotations:
          engine_mapping:
            - engine: toptrajparser
              key: box_type
              value: tetragonal
      Orthorhombic:
        description: 3D unit cell defined by three mutually perpendicular axes of unequal length (a ≠ b ≠ c), where all angles are exactly 90°
        aliases:
          - Orthorhombic
          - orthorhombic
        annotations:
          engine_mapping:
            - engine: toptrajparser
              key: box_type
              value: orthorhombic
      "Truncated Octahedron":
        description: A 14-sided 3D shape (8 hexagonal and 6 square faces) used as a simulation cell in molecular dynamics. Because its geometry closely approximates a sphere, it is ideal for solvating roughly spherical or globular proteins
        aliases:
          - "Truncated Octahedron"
          - truncated_octahedron
        annotations:
          engine_mapping:
            - engine: toptrajparser
              key: box_type
              value: "truncated octahedron"
      Triclinic:
        description: Non-orthogonal simulation cell defined by three arbitrary, non-coplanar vectors. Unlike standard cubic or orthorhombic boxes (which have 90° angles), triclinic boxes can have arbitrary angles and varying edge lengths to model sheared systems, complex crystal lattices, and anisotropic stress tensors
        aliases:
          - Triclinic
          - triclinic
        annotations:
          engine_mapping:
            - engine: toptrajparser
              key: box_type
              value: triclinic
